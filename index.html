<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCMC | Reports</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --p: #7c6dff;
            --p2: #a594ff;
            --pd: #4a3ecc;
            --g: #00d4a8;
            --g2: #00ffcc;
            --danger: #ff5470;
            --warn: #ffb547;
            --bg: #0b0a14;
            --s2: #131224;
            --s3: #1c1a30;
            --s4: #252342;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.12);
            --text: #eeedf5;
            --muted: rgba(238, 237, 245, 0.42);
            --r: 22px;
            --rs: 16px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .syne { font-family: 'Syne', sans-serif; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(10, 9, 20, 0.97);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
        }

        .topbar-inner {
            max-width: 680px;
            margin: auto;
            padding: 14px 0;
        }

        .topbar-row1 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 13px;
        }

        .logo-chip {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-dot {
            width: 34px;
            height: 34px;
            border-radius: 11px;
            background: linear-gradient(135deg, var(--p), var(--g));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            color: white;
            box-shadow: 0 4px 14px rgba(124,109,255,0.4);
        }

        .logo-name {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 800;
        }

        .logo-badge {
            font-size: 9px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 1.4px;
            text-transform: uppercase;
            display: block;
            margin-top: 1px;
        }

        .topbar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .tb-btn {
            padding: 9px 16px;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            border: 1px solid var(--border2);
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.2s;
        }

        .tb-btn:hover {
            background: rgba(255,255,255,0.12);
            color: var(--text);
        }

        .search-wrap {
            position: relative;
            margin-bottom: 12px;
        }

        .search-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 13px;
        }

        .search-inp {
            width: 100%;
            padding: 12px 16px 12px 40px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-family: 'Nunito', sans-serif;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-inp::placeholder { color: var(--muted); }
        .search-inp:focus { border-color: rgba(124,109,255,0.5); }

        /* ── VIEW TABS ── */
        .view-tabs {
            display: flex;
            gap: 5px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 4px;
        }

        .vtab {
            flex: 1;
            padding: 9px 0;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        .vtab i { font-size: 11px; }
        .vtab.active { background: rgba(124,109,255,0.25); color: var(--p2); }

        /* ── MAIN ── */
        .main {
            max-width: 680px;
            margin: auto;
            padding: 20px 14px 80px;
        }

        /* stats */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 22px;
        }

        .stat-card {
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 12px;
            text-align: center;
            animation: fadeUp 0.4s ease both;
        }

        .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            display: block;
        }

        .stat-lbl {
            font-size: 10px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-top: 3px;
            display: block;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .sec-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sec-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--g);
            box-shadow: 0 0 0 0 rgba(0,212,168,0.4);
            animation: liveP 1.5s infinite;
            display: inline-block;
        }

        @keyframes liveP {
            0%   { box-shadow: 0 0 0 0 rgba(0,212,168,0.4); }
            70%  { box-shadow: 0 0 0 7px rgba(0,212,168,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,212,168,0); }
        }

        .today-scroll {
            display: flex;
            gap: 9px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
            margin-bottom: 24px;
        }

        .today-scroll::-webkit-scrollbar { display: none; }

        .today-chip {
            flex-shrink: 0;
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px 16px;
            cursor: pointer;
            min-width: 110px;
            text-align: center;
            transition: all 0.2s;
        }

        .today-chip:hover { border-color: rgba(124,109,255,0.4); transform: translateY(-2px); }

        .today-chip-name {
            font-size: 12px;
            font-weight: 800;
            display: block;
            margin-bottom: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 900;
        }

        .sp-good { background: rgba(0,212,168,0.15); color: var(--g); border: 1px solid rgba(0,212,168,0.3); }
        .sp-poor { background: rgba(255,84,112,0.15); color: var(--danger); border: 1px solid rgba(255,84,112,0.3); }
        .sp-mid  { background: rgba(255,181,71,0.15); color: var(--warn); border: 1px solid rgba(255,181,71,0.3); }

        .count-chip {
            background: var(--s3);
            color: var(--muted);
            font-size: 10px;
            font-weight: 800;
            padding: 3px 10px;
            border-radius: 8px;
        }

        .student-item {
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            transition: border-color 0.2s, transform 0.15s;
        }

        .student-item:hover { border-color: rgba(124,109,255,0.35); transform: translateX(3px); }
        .student-item:active { transform: scale(0.98); }

        .s-rank { font-size: 11px; font-weight: 800; color: var(--muted); width: 22px; text-align: center; flex-shrink: 0; }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 800;
            color: white;
        }

        .av0 { background: linear-gradient(135deg,#7c6dff,#a78bfa); }
        .av1 { background: linear-gradient(135deg,#ff5470,#f472b6); }
        .av2 { background: linear-gradient(135deg,#00d4a8,#34d399); }
        .av3 { background: linear-gradient(135deg,#ffb547,#fbbf24); }
        .av4 { background: linear-gradient(135deg,#3b82f6,#60a5fa); }
        .av5 { background: linear-gradient(135deg,#ec4899,#f43f5e); }
        .av6 { background: linear-gradient(135deg,#8b5cf6,#7c3aed); }
        .av7 { background: linear-gradient(135deg,#14b8a6,#0d9488); }

        .s-info { flex: 1; min-width: 0; }
        .s-name { font-size: 15px; font-weight: 800; display: block; }
        .s-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 3px; display: block; }
        .s-arrow { color: var(--muted); font-size: 13px; }

        /* ── CHAPTER VIEW ── */
        .chapter-card {
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 20px;
            margin-bottom: 10px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .chapter-card:hover { border-color: rgba(124,109,255,0.25); }

        .chapter-header {
            padding: 15px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            transition: background 0.2s;
        }

        .chapter-header:hover { background: rgba(255,255,255,0.03); }

        .ch-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
        }

        .chi0 { background: linear-gradient(135deg,#7c6dff,#a78bfa); }
        .chi1 { background: linear-gradient(135deg,#ff5470,#f472b6); }
        .chi2 { background: linear-gradient(135deg,#00d4a8,#34d399); }
        .chi3 { background: linear-gradient(135deg,#ffb547,#fbbf24); }
        .chi4 { background: linear-gradient(135deg,#3b82f6,#60a5fa); }
        .chi5 { background: linear-gradient(135deg,#ec4899,#f43f5e); }
        .chi6 { background: linear-gradient(135deg,#8b5cf6,#7c3aed); }
        .chi7 { background: linear-gradient(135deg,#14b8a6,#0d9488); }

        .ch-info { flex: 1; min-width: 0; }
        .ch-name { font-size: 14px; font-weight: 800; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-meta { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 3px; display: block; }
        .ch-toggle { color: var(--muted); font-size: 13px; transition: transform 0.3s; flex-shrink: 0; }
        .ch-toggle.open { transform: rotate(90deg); }

        .chapter-students { display: none; border-top: 1px solid var(--border); padding: 8px 16px 12px; }
        .chapter-students.open { display: block; }

        .ch-student-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .ch-student-row:last-child { border-bottom: none; }
        .ch-student-row:hover { transform: translateX(4px); }

        .ch-av {
            width: 36px;
            height: 36px;
            border-radius: 11px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 800;
            color: white;
        }

        .ch-sname { font-size: 13px; font-weight: 800; flex: 1; }
        .ch-smeta { font-size: 10px; color: var(--muted); font-weight: 600; display: block; margin-top: 1px; }

        /* ── MODAL ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 500;
            flex-direction: column;
        }

        .modal.open {
            display: flex;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(24px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .modal-nav {
            background: rgba(10,9,20,0.97);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
            flex-shrink: 0;
        }

        .btn-back {
            width: 38px;
            height: 38px;
            border-radius: 13px;
            background: rgba(255,255,255,0.07);
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-back:hover { background: rgba(255,255,255,0.13); }

        .modal-title-text {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 800;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            max-width: 680px;
            width: 100%;
            margin: auto;
        }

        .hist-card {
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 15px 16px;
            margin-bottom: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 13px;
            transition: border-color 0.2s, transform 0.15s;
        }

        .hist-card:hover { border-color: rgba(124,109,255,0.35); transform: translateX(3px); }

        .h-icon {
            width: 42px;
            height: 42px;
            border-radius: 13px;
            background: rgba(124,109,255,0.12);
            border: 1px solid rgba(124,109,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--p2);
            font-size: 16px;
            flex-shrink: 0;
        }

        .h-info { flex: 1; min-width: 0; }
        .h-chapter { font-size: 14px; font-weight: 800; display: block; }
        .h-ts { font-size: 11px; color: var(--muted); font-weight: 600; display: block; margin-top: 2px; }

        .result-hero {
            background: var(--s2);
            border: 1px solid var(--border2);
            border-radius: 24px;
            padding: 28px 22px;
            text-align: center;
            margin-bottom: 16px;
            position: relative;
            overflow: hidden;
        }

        .result-hero::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: rgba(124,109,255,0.12);
        }

        .big-score { font-family: 'Syne', sans-serif; font-size: 56px; font-weight: 800; line-height: 1; }
        .big-score.good { color: var(--g); }
        .big-score.mid  { color: var(--warn); }
        .big-score.poor { color: var(--danger); }

        .hero-name { font-size: 16px; font-weight: 800; margin-top: 8px; }
        .hero-meta { font-size: 12px; color: var(--muted); font-weight: 600; margin-top: 4px; }

        .pills-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 16px;
        }

        .pill { background: var(--s3); border: 1px solid var(--border); border-radius: 16px; padding: 14px 10px; text-align: center; }
        .pill-num { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; display: block; }
        .pill-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; display: block; margin-top: 3px; }

        .filter-strip {
            display: flex;
            gap: 7px;
            overflow-x: auto;
            scrollbar-width: none;
            margin-bottom: 16px;
            padding-bottom: 2px;
        }

        .filter-strip::-webkit-scrollbar { display: none; }

        .ftab {
            flex-shrink: 0;
            padding: 9px 16px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
            background: var(--s3);
            border: 1px solid var(--border);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        .ftab .num { font-size: 11px; opacity: 0.6; }
        .ftab.active { background: var(--p); border-color: var(--p); color: #fff; }

        .q-card {
            background: var(--s3);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 11px;
            border-left: 4px solid transparent;
            position: relative;
        }

        .q-card[data-type="correct"] { border-left-color: var(--g); }
        .q-card[data-type="wrong"]   { border-left-color: var(--danger); }
        .q-card[data-type="skipped"] { border-left-color: var(--warn); }

        .q-num { font-size: 10px; font-weight: 800; color: var(--muted); margin-bottom: 7px; display: block; letter-spacing: 0.06em; }
        .q-text { font-size: 14px; font-weight: 700; line-height: 1.55; color: var(--text); word-break: break-word; }

        .q-img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 13px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
        }

        .ans-row { margin-top: 12px; display: flex; flex-direction: column; gap: 7px; }

        .ans-item {
            padding: 10px 13px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ans-student { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted); }
        .ans-correct { background: rgba(0,212,168,0.1); border: 1px solid rgba(0,212,168,0.25); color: var(--g); }
        .ans-wrong   { background: rgba(255,84,112,0.1); border: 1px solid rgba(255,84,112,0.25); color: var(--danger); }

        .empty-state { text-align: center; padding: 50px 20px; }
        .empty-icon  { font-size: 40px; margin-bottom: 12px; display: block; }
        .empty-text  { font-size: 14px; color: var(--muted); font-weight: 600; }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-inner">
            <div class="topbar-row1">
                <div class="logo-chip">
                    <div class="logo-dot"><i class="fa-solid fa-brain"></i></div>
                    <div>
                        <div class="logo-name syne">CCMC Reports</div>
                        <span class="logo-badge">Student Analytics</span>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="tb-btn" onclick="smartBack()"><i class="fa-solid fa-house"></i> Home</button>
                </div>
            </div>
            <div class="search-wrap">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="findStudent" class="search-inp" placeholder="Student dhundo…" onkeyup="doSearch()">
            </div>
            <div class="view-tabs">
                <button class="vtab active" id="tab-students" onclick="switchView('students')">
                    <i class="fa-solid fa-users"></i> Students
                </button>
                <button class="vtab" id="tab-chapters" onclick="switchView('chapters')">
                    <i class="fa-solid fa-book-open"></i> Chapters
                </button>
            </div>
        </div>
    </div>

    <div class="main">
        <div class="stats-row">
            <div class="stat-card" style="animation-delay:0s">
                <span class="stat-num" id="totalStudents" style="color:var(--p2)">—</span>
                <span class="stat-lbl">Students</span>
            </div>
            <div class="stat-card" style="animation-delay:0.05s">
                <span class="stat-num" id="totalTests" style="color:var(--g)">—</span>
                <span class="stat-lbl">Tests</span>
            </div>
            <div class="stat-card" style="animation-delay:0.1s">
                <span class="stat-num" id="avgScore" style="color:var(--warn)">—</span>
                <span class="stat-lbl">Avg %</span>
            </div>
        </div>

        <div id="view-students">
            <div id="todaySection"></div>
            <div class="sec-label">
                <i class="fa-solid fa-users"></i> Sabhi Students
                <span class="count-chip" id="countChip">0</span>
            </div>
            <div id="studentList"></div>
        </div>

        <div id="view-chapters" style="display:none;">
            <div class="sec-label">
                <i class="fa-solid fa-book-open"></i> Chapter Wise
                <span class="count-chip" id="chapterCountChip">0</span>
            </div>
            <div id="chapterList"></div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="viewModal" class="modal">
        <div class="modal-nav">
            <button class="btn-back" id="modalBackBtn"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="modal-title-text" id="modalTitle">Details</div>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAX40dcdJ96TOhBgqa4bbIiOwLlUShnUI8",
            databaseURL: "https://ccmc-90ba3-default-rtdb.firebaseio.com",
            projectId: "ccmc-90ba3"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        let dataMap = {}, chapterMap = {}, allAttempts = [];
        let currentView = 'students';

        // Seedha app shuru — koi login nahi
        window.onload = () => initApp();

        function initApp() {
            const db = firebase.database();
            db.ref('user_attempts').on('value', snap => {
                const raw = snap.val() || {};
                dataMap = {}; chapterMap = {}; allAttempts = [];
                Object.keys(raw).forEach(id => {
                    const r = raw[id];
                    if (!r || !r.user) return;
                    allAttempts.push({ id, ...r });
                    if (!dataMap[r.user]) dataMap[r.user] = [];
                    dataMap[r.user].push({ id, ...r });
                    const ch = (r.chapter || 'Unknown Chapter').trim();
                    if (!chapterMap[ch]) chapterMap[ch] = [];
                    chapterMap[ch].push({ id, ...r });
                });
                updateStats();
                doSearch();
            });
        }

        function isToday(ts) {
            if (!ts) return false;
            const now = new Date();
            const clean = (ts + '').split(',')[0].trim();
            const d = now.getDate(), m = now.getMonth() + 1, y = now.getFullYear();
            return [
                `${d}/${m}/${y}`,
                `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`,
                `${m}/${d}/${y}`
            ].includes(clean);
        }

        function updateStats() {
            document.getElementById('totalStudents').textContent = Object.keys(dataMap).length;
            document.getElementById('totalTests').textContent = allAttempts.length;
            const scores = allAttempts.map(a => parseFloat(a.score)).filter(n => !isNaN(n));
            const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
            document.getElementById('avgScore').textContent = avg + '%';
        }

        function switchView(v) {
            currentView = v;
            document.getElementById('view-students').style.display = v==='students' ? 'block' : 'none';
            document.getElementById('view-chapters').style.display  = v==='chapters' ? 'block' : 'none';
            document.getElementById('tab-students').classList.toggle('active', v==='students');
            document.getElementById('tab-chapters').classList.toggle('active', v==='chapters');
            document.getElementById('findStudent').placeholder = v==='students' ? 'Student dhundo…' : 'Chapter dhundo…';
            doSearch();
        }

        function doSearch() {
            const val = document.getElementById('findStudent').value.toLowerCase().trim();
            if (currentView === 'students') {
                const todayList = allAttempts.filter(a => isToday(a.timestamp) && a.user.toLowerCase().includes(val));
                const names = Object.keys(dataMap).filter(n => n.toLowerCase().includes(val)).sort();
                renderStudents(todayList, names);
            } else {
                const chapters = Object.keys(chapterMap).filter(c => c.toLowerCase().includes(val)).sort();
                renderChapters(chapters);
            }
        }

        function avClass(name)  { return 'av'  + (name.charCodeAt(0) % 8); }
        function chiClass(name) { return 'chi' + ((name||'A').charCodeAt(0) % 8); }
        function scoreClass(s)  { return s>=70 ? 'sp-good' : s>=40 ? 'sp-mid' : 'sp-poor'; }

        function renderStudents(todayList, names) {
            const ts = document.getElementById('todaySection');
            if (todayList.length > 0) {
                ts.innerHTML = `
                    <div class="sec-label"><span class="live-dot"></span> Aaj Active</div>
                    <div class="today-scroll">
                        ${todayList.map(a=>`
                        <div class="today-chip" onclick="openDeepDetail('${a.user.replace(/'/g,"\\'")}','${a.id}')">
                            <span class="today-chip-name">${a.user}</span>
                            <span class="score-pill ${scoreClass(parseFloat(a.score))}">${a.score}%</span>
                        </div>`).join('')}
                    </div>`;
            } else {
                ts.innerHTML = '';
            }

            document.getElementById('countChip').textContent = names.length;
            const list = document.getElementById('studentList');
            if (!names.length) {
                list.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-text">Koi student nahi mila</div></div>`;
                return;
            }
            list.innerHTML = names.map((n,i) => {
                const attempts = dataMap[n].length;
                const scores = dataMap[n].map(a=>parseFloat(a.score)).filter(x=>!isNaN(x));
                const avg = scores.length ? Math.round(scores.reduce((s,v)=>s+v,0)/scores.length) : 0;
                const sc = scoreClass(avg);
                return `
                <div class="student-item" onclick="openHistory('${n.replace(/'/g,"\\'")}')">
                    <span class="s-rank">${i+1}</span>
                    <div class="avatar ${avClass(n)}">${n.charAt(0).toUpperCase()}</div>
                    <div class="s-info">
                        <span class="s-name">${n}</span>
                        <span class="s-meta">${attempts} attempt${attempts>1?'s':''} &bull; avg <span class="score-pill ${sc}" style="padding:2px 8px;font-size:10px;">${avg}%</span></span>
                    </div>
                    <i class="fa-solid fa-chevron-right s-arrow"></i>
                </div>`;
            }).join('');
        }

        function renderChapters(chapters) {
            document.getElementById('chapterCountChip').textContent = chapters.length;
            const list = document.getElementById('chapterList');
            if (!chapters.length) {
                list.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-text">Koi chapter nahi mila</div></div>`;
                return;
            }
            list.innerHTML = chapters.map(ch => {
                const attempts = chapterMap[ch];
                const uniqueStudents = [...new Set(attempts.map(a=>a.user))].sort();
                const scores = attempts.map(a=>parseFloat(a.score)).filter(x=>!isNaN(x));
                const avg = scores.length ? Math.round(scores.reduce((s,v)=>s+v,0)/scores.length) : 0;

                const studentRows = uniqueStudents.map(sname => {
                    const sAttempts = attempts.filter(a=>a.user===sname);
                    const sScores = sAttempts.map(a=>parseFloat(a.score)).filter(x=>!isNaN(x));
                    const sAvg = sScores.length ? Math.round(sScores.reduce((s,v)=>s+v,0)/sScores.length) : 0;
                    return `
                    <div class="ch-student-row" onclick="openChapterStudentHistory('${sname.replace(/'/g,"\\'")}','${ch.replace(/'/g,"\\'")}')">
                        <div class="ch-av ${avClass(sname)}">${sname.charAt(0).toUpperCase()}</div>
                        <div style="flex:1;min-width:0;">
                            <div class="ch-sname">${sname}</div>
                            <span class="ch-smeta">${sAttempts.length} attempt${sAttempts.length>1?'s':''}</span>
                        </div>
                        <span class="score-pill ${scoreClass(sAvg)}" style="font-size:11px;">${sAvg}%</span>
                        <i class="fa-solid fa-chevron-right s-arrow" style="font-size:11px;margin-left:6px;"></i>
                    </div>`;
                }).join('');

                return `
                <div class="chapter-card">
                    <div class="chapter-header" onclick="toggleChapter(this)">
                        <div class="ch-icon ${chiClass(ch)}"><i class="fa-solid fa-book"></i></div>
                        <div class="ch-info">
                            <span class="ch-name">${ch}</span>
                            <span class="ch-meta">${uniqueStudents.length} student${uniqueStudents.length>1?'s':''} &bull; ${attempts.length} attempt${attempts.length>1?'s':''} &bull; avg ${avg}%</span>
                        </div>
                        <i class="fa-solid fa-chevron-right ch-toggle"></i>
                    </div>
                    <div class="chapter-students">${studentRows}</div>
                </div>`;
            }).join('');
        }

        function toggleChapter(headerEl) {
            const body = headerEl.nextElementSibling;
            const icon = headerEl.querySelector('.ch-toggle');
            const isOpen = body.classList.contains('open');
            body.classList.toggle('open', !isOpen);
            icon.classList.toggle('open', !isOpen);
        }

        function openChapterStudentHistory(name, chapter) {
            const logs = (chapterMap[chapter]||[]).filter(a=>a.user===name).slice().reverse();
            const html = logs.map(l => {
                const sc = parseFloat(l.score);
                return `
                <div class="hist-card" onclick="openDeepDetailFromChapter('${name.replace(/'/g,"\\'")}','${l.id}','${chapter.replace(/'/g,"\\'")}')">
                    <div class="h-icon"><i class="fa-solid fa-file-alt"></i></div>
                    <div class="h-info">
                        <span class="h-chapter">${l.chapter||'Unknown Chapter'}</span>
                        <span class="h-ts">${l.timestamp||''}</span>
                    </div>
                    <span class="score-pill ${scoreClass(sc)}">${l.score}%</span>
                    <i class="fa-solid fa-chevron-right s-arrow" style="font-size:12px;"></i>
                </div>`;
            }).join('');
            openModal(name, html||`<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">Koi attempt nahi</div></div>`, closeModal);
        }

        function openDeepDetailFromChapter(name, id, chapter) {
            _openDeepDetail(name, id, () => openChapterStudentHistory(name, chapter));
        }

        function openModal(title, html, onBack) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('modalBody').scrollTop = 0;
            document.getElementById('modalBackBtn').onclick = onBack;
            document.getElementById('viewModal').className = 'modal open';
        }

        function closeModal() {
            document.getElementById('viewModal').className = 'modal';
        }

        function openHistory(name) {
            const logs = [...(dataMap[name]||[])].reverse();
            if (!logs.length) {
                openModal(name, `<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">Koi attempt nahi</div></div>`, closeModal);
                return;
            }
            const html = logs.map(l => {
                const sc = parseFloat(l.score);
                return `
                <div class="hist-card" onclick="openDeepDetail('${name.replace(/'/g,"\\'")}','${l.id}')">
                    <div class="h-icon"><i class="fa-solid fa-file-alt"></i></div>
                    <div class="h-info">
                        <span class="h-chapter">${l.chapter||'Unknown Chapter'}</span>
                        <span class="h-ts">${l.timestamp||''}</span>
                    </div>
                    <span class="score-pill ${scoreClass(sc)}">${l.score}%</span>
                    <i class="fa-solid fa-chevron-right s-arrow" style="font-size:12px;"></i>
                </div>`;
            }).join('');
            openModal(name, html, closeModal);
        }

        function openDeepDetail(name, id) {
            _openDeepDetail(name, id, () => openHistory(name));
        }

        function _openDeepDetail(name, id, backFn) {
            const test = allAttempts.find(x => x.id === id);
            if (!test) return;

            let responses = test.responses || [];
            if (!Array.isArray(responses)) responses = Object.values(responses);

            const total   = responses.length;
            const right   = responses.filter(r => r && r.status==='correct').length;
            const skipped = responses.filter(r => r && (!r.selectedOption || r.selectedOption==='Skipped')).length;
            const wrong   = total - right - skipped;
            const sc = parseFloat(test.score);
            const scoreGrade = sc>=70 ? 'good' : sc>=40 ? 'mid' : 'poor';

            const qCards = responses.map((r,i) => {
                if (!r) return '';
                const isSkipped = !r.selectedOption || r.selectedOption==='Skipped';
                const isCorrect = r.status==='correct';
                const type = isSkipped ? 'skipped' : (isCorrect ? 'correct' : 'wrong');
                const imgHtml = r.img ? `<img src="${r.img}" class="q-img" onerror="this.style.display='none'">` : '';
                return `
                <div class="q-card q-box" data-type="${type}">
                    <span class="q-num">Q${i+1} &nbsp;·&nbsp; ${type.toUpperCase()}</span>
                    ${imgHtml}
                    <div class="q-text">${r.question||''}</div>
                    <div class="ans-row">
                        <div class="ans-item ${isCorrect?'ans-correct':(isSkipped?'ans-student':'ans-wrong')}">
                            <i class="fa-solid ${isCorrect?'fa-check':(isSkipped?'fa-minus':'fa-xmark')}"></i>
                            ${r.selectedOption||'Skipped'}
                        </div>
                        ${!isCorrect ? `
                        <div class="ans-item ans-correct">
                            <i class="fa-solid fa-check"></i> ${r.correctOption||''}
                        </div>` : ''}
                    </div>
                </div>`;
            }).join('');

            const html = `
            <div class="result-hero">
                <div class="big-score ${scoreGrade}">${test.score}%</div>
                <div class="hero-name">${name}</div>
                <div class="hero-meta">${test.chapter||''} &bull; ${test.timestamp||''}</div>
            </div>
            <div class="pills-row">
                <div class="pill"><span class="pill-num" style="color:var(--g)">${right}</span><span class="pill-lbl">Sahi</span></div>
                <div class="pill"><span class="pill-num" style="color:var(--danger)">${wrong}</span><span class="pill-lbl">Galat</span></div>
                <div class="pill"><span class="pill-num" style="color:var(--warn)">${skipped}</span><span class="pill-lbl">Skip</span></div>
            </div>
            <div class="filter-strip">
                <div class="ftab active" onclick="filterQ('all',this)">Sab <span class="num">${total}</span></div>
                <div class="ftab" onclick="filterQ('correct',this)">✅ Sahi <span class="num">${right}</span></div>
                <div class="ftab" onclick="filterQ('wrong',this)">❌ Galat <span class="num">${wrong}</span></div>
                <div class="ftab" onclick="filterQ('skipped',this)">⏭ Skip <span class="num">${skipped}</span></div>
            </div>
            <div id="qContainer">${qCards}</div>`;

            openModal(name, html, backFn);
        }

        function filterQ(type, btn) {
            document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.q-box').forEach(box => {
                box.style.display = (type==='all' || box.dataset.type===type) ? 'block' : 'none';
            });
        }

        function smartBack() {
            if (window.history.length > 1) window.history.back();
            else window.location.href = 'index.html';
        }
    </script>
</body>
</html>

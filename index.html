<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCMC | Master Intelligence Admin</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --ink: #0a0a0f;
            --ink2: #1e1e2e;
            --ink3: #2d2d44;
            --muted: #6b6b8a;
            --faint: #f0f0f7;
            --line: #e4e4f0;
            --white: #ffffff;
            --accent: #6c63ff;
            --accent2: #ff6584;
            --success: #00d68f;
            --warning: #ffb547;
            --danger: #ff4d6d;
            --surface: #fafafd;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── NOISE TEXTURE overlay ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        /* ── HEADER ── */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.96);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255,255,255,0.06);
            padding: 0 20px;
        }

        .header-inner {
            max-width: 640px; margin: auto;
            padding: 18px 0 14px;
        }

        .header-row1 {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }

        .logo-chip {
            display: flex; align-items: center; gap: 10px;
        }

        .logo-dot {
            width: 32px; height: 32px; border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: white;
            box-shadow: 0 4px 12px rgba(108,99,255,0.4);
        }

        .logo-text {
            font-size: 16px; font-weight: 800; color: white; letter-spacing: -0.3px;
        }
        .logo-sub {
            font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.35);
            letter-spacing: 1.5px; text-transform: uppercase; display: block; margin-top: 1px;
        }

        .btn-home {
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            padding: 8px 16px; border-radius: 10px;
            font-family: 'Sora', sans-serif;
            font-size: 12px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; gap: 7px;
            transition: all 0.2s;
        }
        .btn-home:hover { background: rgba(255,255,255,0.13); color: white; }

        /* ── SEARCH ── */
        .search-wrap { position: relative; }
        .search-wrap i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.25); font-size: 13px;
        }
        .search-input {
            width: 100%; padding: 13px 16px 13px 42px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 14px; color: white;
            font-family: 'Sora', sans-serif; font-size: 14px;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-input::placeholder { color: rgba(255,255,255,0.25); }
        .search-input:focus {
            border-color: rgba(108,99,255,0.5);
            background: rgba(108,99,255,0.07);
        }

        /* ── MAIN ── */
        .main { max-width: 640px; margin: auto; padding: 24px 16px 80px; position: relative; z-index: 1; }

        /* ── STATS ROW ── */
        .stats-row {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 10px; margin-bottom: 24px;
        }
        .stat-card {
            background: white;
            border: 1px solid var(--line);
            border-radius: 18px; padding: 16px 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            animation: fadeUp 0.4s ease both;
        }
        .stat-card:nth-child(2) { animation-delay: 0.05s; }
        .stat-card:nth-child(3) { animation-delay: 0.1s; }
        .stat-num {
            font-size: 24px; font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
            color: var(--ink); display: block;
        }
        .stat-lbl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; display: block; }

        /* ── TODAY BANNER ── */
        .today-section { margin-bottom: 28px; animation: fadeUp 0.4s ease 0.1s both; }

        .section-head {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 11px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1.2px;
            display: flex; align-items: center; gap: 6px;
        }
        .live-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 0 0 rgba(0,214,143,0.4);
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(0,214,143,0.4); }
            70% { box-shadow: 0 0 0 6px rgba(0,214,143,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,214,143,0); }
        }

        .today-scroll {
            display: flex; gap: 10px; overflow-x: auto;
            padding-bottom: 4px; scrollbar-width: none;
        }
        .today-scroll::-webkit-scrollbar { display: none; }

        .today-chip {
            flex-shrink: 0;
            background: white; border: 1px solid var(--line);
            border-radius: 16px; padding: 12px 16px;
            cursor: pointer; min-width: 110px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            transition: all 0.2s; text-align: center;
        }
        .today-chip:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.08); border-color: var(--accent); }
        .today-chip-name {
            font-size: 13px; font-weight: 700; color: var(--ink);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: block; margin-bottom: 5px;
        }
        .score-badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }
        .badge-good { background: #e6fff5; color: #00a86b; }
        .badge-poor { background: #fff0f3; color: #c0392b; }

        /* ── STUDENT LIST ── */
        .students-section { animation: fadeUp 0.4s ease 0.15s both; }

        .count-badge {
            background: var(--faint); color: var(--muted);
            font-size: 10px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            padding: 3px 8px; border-radius: 6px;
        }

        .student-item {
            background: white; border: 1px solid var(--line);
            border-radius: 20px; padding: 16px 18px;
            margin-bottom: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.2s; position: relative; overflow: hidden;
        }
        .student-item::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0;
            width: 0; background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 20px 0 0 20px;
            transition: width 0.3s ease;
        }
        .student-item:hover { border-color: rgba(108,99,255,0.3); box-shadow: 0 6px 20px rgba(108,99,255,0.08); transform: translateX(3px); }
        .student-item:hover::before { width: 4px; }

        .s-rank {
            font-size: 11px; font-weight: 700; color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            width: 20px; text-align: center; flex-shrink: 0;
        }

        .avatar {
            width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px; font-weight: 800; color: white;
        }

        .s-info { flex: 1; min-width: 0; }
        .s-name { font-size: 15px; font-weight: 700; color: var(--ink); display: block; }
        .s-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: block; }

        .s-arrow {
            color: var(--line); font-size: 13px;
            transition: color 0.2s, transform 0.2s;
        }
        .student-item:hover .s-arrow { color: var(--accent); transform: translateX(3px); }

        /* ── MODAL ── */
        .modal {
            display: none; position: fixed; inset: 0;
            background: var(--surface); z-index: 500;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }
        .modal.open { display: flex; }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
            padding: 14px 18px;
            display: flex; align-items: center; gap: 12px;
            position: sticky; top: 0; z-index: 10;
        }

        .btn-back-modal {
            width: 36px; height: 36px; border-radius: 11px;
            background: var(--faint); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: var(--ink); font-size: 14px; transition: all 0.2s;
        }
        .btn-back-modal:hover { background: var(--line); }

        .modal-title { font-size: 17px; font-weight: 800; color: var(--ink); }

        .modal-body {
            flex: 1; overflow-y: auto; padding: 20px 18px;
            max-width: 640px; width: 100%; margin: auto;
            scrollbar-width: thin; scrollbar-color: var(--line) transparent;
        }

        /* ── HISTORY CARDS ── */
        .history-card {
            background: white; border: 1px solid var(--line);
            border-radius: 18px; padding: 16px 18px;
            margin-bottom: 10px; cursor: pointer;
            display: flex; align-items: center; gap: 14px;
            transition: all 0.2s;
        }
        .history-card:hover { border-color: rgba(108,99,255,0.3); transform: translateX(3px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }

        .h-icon {
            width: 42px; height: 42px; border-radius: 13px;
            background: var(--faint); display: flex; align-items: center;
            justify-content: center; color: var(--accent); font-size: 16px; flex-shrink: 0;
        }
        .h-info { flex: 1; min-width: 0; }
        .h-chapter { font-size: 14px; font-weight: 700; color: var(--ink); display: block; }
        .h-ts { font-size: 11px; color: var(--muted); display: block; margin-top: 2px; }

        /* ── DEEP DETAIL ── */
        .result-hero {
            background: linear-gradient(135deg, var(--ink), var(--ink2));
            border-radius: 24px; padding: 28px 24px;
            text-align: center; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }
        .result-hero::after {
            content: '';
            position: absolute; top: -30px; right: -30px;
            width: 120px; height: 120px; border-radius: 50%;
            background: rgba(108,99,255,0.15);
        }

        .big-score {
            font-size: 58px; font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
        }
        .big-score.good { color: var(--success); }
        .big-score.poor { color: var(--danger); }

        .hero-name { font-size: 16px; font-weight: 700; color: white; margin-top: 8px; }
        .hero-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }

        .stats-pills {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; margin-bottom: 20px;
        }
        .stat-pill {
            background: white; border: 1px solid var(--line);
            border-radius: 14px; padding: 14px 10px; text-align: center;
        }
        .pill-num {
            font-size: 22px; font-weight: 800;
            font-family: 'JetBrains Mono', monospace;
        }
        .pill-lbl { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.7px; display: block; margin-top: 2px; }

        /* Filter Tabs */
        .filter-strip {
            display: flex; gap: 6px; overflow-x: auto;
            scrollbar-width: none; margin-bottom: 18px;
        }
        .filter-strip::-webkit-scrollbar { display: none; }

        .ftab {
            flex-shrink: 0; padding: 9px 16px; border-radius: 12px;
            font-size: 12px; font-weight: 700; cursor: pointer;
            border: 1.5px solid var(--line); background: white; color: var(--muted);
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s; font-family: 'Sora', sans-serif;
        }
        .ftab .num { font-family: 'JetBrains Mono', monospace; font-size: 11px; opacity: 0.6; }
        .ftab.active { background: var(--ink); color: white; border-color: var(--ink); }
        .ftab.active .num { opacity: 0.5; }

        /* Question Cards */
        .q-card {
            background: white; border: 1px solid var(--line);
            border-radius: 18px; padding: 18px;
            margin-bottom: 12px; position: relative;
            border-left: 4px solid transparent;
        }
        .q-card[data-type="correct"] { border-left-color: var(--success); }
        .q-card[data-type="wrong"] { border-left-color: var(--danger); }
        .q-card[data-type="skipped"] { border-left-color: var(--warning); }

        .q-num {
            font-size: 10px; font-weight: 700; color: var(--muted);
            font-family: 'JetBrains Mono', monospace; margin-bottom: 6px; display: block;
        }
        .q-text { font-size: 14px; font-weight: 600; line-height: 1.5; color: var(--ink); }

        .ans-row { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
        .ans-item {
            padding: 10px 13px; border-radius: 11px; font-size: 13px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
        }
        .ans-item.student { background: var(--faint); color: var(--muted); }
        .ans-item.correct-a { background: #e8fff4; color: #00845a; border: 1px solid #b3f0d6; }
        .ans-item i { font-size: 11px; }

        /* Empty states */
        .empty-state {
            text-align: center; padding: 50px 20px;
        }
        .empty-icon { font-size: 40px; margin-bottom: 12px; display: block; filter: grayscale(0.3); }
        .empty-text { font-size: 14px; color: var(--muted); font-weight: 500; }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Avatar colors */
        .av-0 { background: linear-gradient(135deg, #6c63ff, #a78bfa); }
        .av-1 { background: linear-gradient(135deg, #ff6584, #f472b6); }
        .av-2 { background: linear-gradient(135deg, #00d68f, #34d399); }
        .av-3 { background: linear-gradient(135deg, #ffb547, #fbbf24); }
        .av-4 { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .av-5 { background: linear-gradient(135deg, #ec4899, #f43f5e); }
        .av-6 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .av-7 { background: linear-gradient(135deg, #14b8a6, #0d9488); }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-inner">
        <div class="header-row1">
            <div class="logo-chip">
                <div class="logo-dot"><i class="fa-solid fa-brain"></i></div>
                <div>
                    <div class="logo-text">CCMC Admin</div>
                    <span class="logo-sub">By Danish Ansari</span>
                </div>
            </div>
            <button class="btn-home" onclick="smartBack()">
                <i class="fa-solid fa-house"></i> Danish Ansari
            </button>
        </div>
        <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="findStudent" class="search-input" placeholder="Student dhundo..." onkeyup="doSearch()">
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="main">
    <!-- Stats -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card">
            <span class="stat-num" id="totalStudents">—</span>
            <span class="stat-lbl">Students</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="totalTests">—</span>
            <span class="stat-lbl">Tests</span>
        </div>
        <div class="stat-card">
            <span class="stat-num" id="avgScore">—</span>
            <span class="stat-lbl">Avg %</span>
        </div>
    </div>

    <!-- Today -->
    <div class="today-section" id="todaySection"></div>

    <!-- All Students -->
    <div class="students-section">
        <div class="section-head">
            <span class="section-title"><i class="fa-solid fa-users"></i> Sabhi Students</span>
            <span class="count-badge" id="countBadge">0</span>
        </div>
        <div id="studentList"></div>
    </div>
</div>

<!-- MODAL -->
<div id="viewModal" class="modal">
    <div class="modal-nav">
        <button class="btn-back-modal" id="modalBack"><i class="fa-solid fa-chevron-left"></i></button>
        <span class="modal-title" id="modalTitle">Details</span>
    </div>
    <div class="modal-body" id="modalBody"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAX40dcdJ96TOhBgqa4bbIiOwLlUShnUI8",
        databaseURL: "https://ccmc-90ba3-default-rtdb.firebaseio.com",
        projectId: "ccmc-90ba3"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let dataMap = {};
    let allAttempts = [];

    const avatarClass = name => 'av-' + (name.charCodeAt(0) % 8);

    function smartBack() {
        if (window.history.length > 1) window.history.back();
        else window.location.href = "https://danishansari.netlify.app";
    }

    function isToday(ts) {
        if (!ts) return false;
        const now = new Date();
        const clean = ts.split(',')[0].trim();
        const d = now.getDate(), m = now.getMonth() + 1, y = now.getFullYear();
        return [`${d}/${m}/${y}`, `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`, `${m}/${d}/${y}`].includes(clean);
    }

    db.ref('user_attempts').on('value', snap => {
        const raw = snap.val() || {};
        dataMap = {}; allAttempts = [];
        Object.keys(raw).forEach(id => {
            const r = raw[id];
            allAttempts.push({ id, ...r });
            if (!dataMap[r.user]) dataMap[r.user] = [];
            dataMap[r.user].push({ id, ...r });
        });
        updateStats();
        doSearch();
    });

    function updateStats() {
        const names = Object.keys(dataMap);
        document.getElementById('totalStudents').textContent = names.length;
        document.getElementById('totalTests').textContent = allAttempts.length;
        const scores = allAttempts.map(a => parseFloat(a.score)).filter(n => !isNaN(n));
        const avg = scores.length ? Math.round(scores.reduce((s, n) => s + n, 0) / scores.length) : 0;
        document.getElementById('avgScore').textContent = avg + '%';
        document.getElementById('countBadge').textContent = names.length;
    }

    function doSearch() {
        const val = document.getElementById('findStudent').value.toLowerCase().trim();
        const todayList = allAttempts.filter(a => isToday(a.timestamp) && a.user.toLowerCase().includes(val));
        const names = Object.keys(dataMap).filter(n => n.toLowerCase().includes(val)).sort();
        renderPage(todayList, names);
    }

    function renderPage(todayList, names) {
        // Today
        const ts = document.getElementById('todaySection');
        if (todayList.length > 0) {
            ts.innerHTML = `
                <div class="section-head">
                    <span class="section-title"><span class="live-dot"></span> Aaj Active</span>
                </div>
                <div class="today-scroll">
                    ${todayList.map(a => `
                        <div class="today-chip" onclick="openDeepDetail('${a.user}', '${a.id}')">
                            <span class="today-chip-name">${a.user}</span>
                            <span class="score-badge ${parseFloat(a.score)>=40?'badge-good':'badge-poor'}">${a.score}%</span>
                        </div>
                    `).join('')}
                </div>
            `;
        } else {
            ts.innerHTML = '';
        }

        // Students
        const list = document.getElementById('studentList');
        document.getElementById('countBadge').textContent = names.length;

        if (names.length === 0) {
            list.innerHTML = `<div class="empty-state"><span class="empty-icon">🔍</span><div class="empty-text">Koi student nahi mila</div></div>`;
            return;
        }

        list.innerHTML = names.map((n, i) => {
            const attempts = dataMap[n].length;
            const scores = dataMap[n].map(a => parseFloat(a.score)).filter(x => !isNaN(x));
            const avg = scores.length ? Math.round(scores.reduce((s, v) => s + v, 0) / scores.length) : 0;
            return `
                <div class="student-item" onclick="openHistory('${n}')">
                    <span class="s-rank">${i+1}</span>
                    <div class="avatar ${avatarClass(n)}">${n.charAt(0).toUpperCase()}</div>
                    <div class="s-info">
                        <span class="s-name">${n}</span>
                        <span class="s-meta">${attempts} attempt${attempts>1?'s':''} &bull; avg ${avg}%</span>
                    </div>
                    <i class="fa-solid fa-chevron-right s-arrow"></i>
                </div>
            `;
        }).join('');
    }

    function openModal(title, content, onBack) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = content;
        document.getElementById('modalBody').scrollTop = 0;
        const modal = document.getElementById('viewModal');
        modal.className = 'modal open';
        document.getElementById('modalBack').onclick = onBack;
    }

    function closeModal() {
        document.getElementById('viewModal').className = 'modal';
    }

    function openHistory(name) {
        const logs = [...dataMap[name]].reverse();
        const html = logs.map(l => {
            const good = parseFloat(l.score) >= 40;
            return `
                <div class="history-card" onclick="openDeepDetail('${name}', '${l.id}')">
                    <div class="h-icon"><i class="fa-solid fa-file-alt"></i></div>
                    <div class="h-info">
                        <span class="h-chapter">${l.chapter || 'Unknown Chapter'}</span>
                        <span class="h-ts">${l.timestamp}</span>
                    </div>
                    <span class="score-badge ${good?'badge-good':'badge-poor'}">${l.score}%</span>
                    <i class="fa-solid fa-chevron-right s-arrow" style="font-size:12px; color:#e4e4f0;"></i>
                </div>
            `;
        }).join('');
        openModal(name, html || `<div class="empty-state"><span class="empty-icon">📭</span><div class="empty-text">Koi attempt nahi</div></div>`, closeModal);
    }

    function openDeepDetail(name, id) {
        const test = allAttempts.find(x => x.id === id);
        if (!test) return;

        const total = test.responses.length;
        const right = test.responses.filter(r => r.status === 'correct').length;
        const skipped = test.responses.filter(r => !r.selectedOption || r.selectedOption === 'Skipped').length;
        const wrong = total - right - skipped;
        const good = parseFloat(test.score) >= 40;

        const qCards = test.responses.map((r, i) => {
            const isSkipped = !r.selectedOption || r.selectedOption === 'Skipped';
            const isCorrect = r.status === 'correct';
            const type = isSkipped ? 'skipped' : (isCorrect ? 'correct' : 'wrong');
            const imgHtml = r.img ? `<img src="${r.img}" style="width:100%; max-height:200px; object-fit:contain; border-radius:14px; margin:10px 0; background:#f8fafc; border:1px solid var(--line);">` : '';
            return `
                <div class="q-card q-box" data-type="${type}">
                    <span class="q-num">Q${i+1}</span>
                    ${imgHtml}
                    <div class="q-text">${r.question}</div>
                    <div class="ans-row">
                        <div class="ans-item student"><i class="fa-solid fa-user"></i> ${r.selectedOption || 'Skipped'}</div>
                        ${!isCorrect ? `<div class="ans-item correct-a"><i class="fa-solid fa-check"></i> ${r.correctOption}</div>` : ''}
                    </div>
                </div>
            `;
        }).join('');

        const html = `
            <div class="result-hero">
                <div class="big-score ${good?'good':'poor'}">${test.score}%</div>
                <div class="hero-name">${name}</div>
                <div class="hero-meta">${test.chapter || ''} &bull; ${test.timestamp}</div>
            </div>

            <div class="stats-pills">
                <div class="stat-pill"><span class="pill-num" style="color:var(--success)">${right}</span><span class="pill-lbl">Sahi</span></div>
                <div class="stat-pill"><span class="pill-num" style="color:var(--danger)">${wrong}</span><span class="pill-lbl">Galat</span></div>
                <div class="stat-pill"><span class="pill-num" style="color:var(--warning)">${skipped}</span><span class="pill-lbl">Skip</span></div>
            </div>

            <div class="filter-strip">
                <div class="ftab active" onclick="filterQ('all',this)">Sab <span class="num">${total}</span></div>
                <div class="ftab" onclick="filterQ('correct',this)">✅ Sahi <span class="num">${right}</span></div>
                <div class="ftab" onclick="filterQ('wrong',this)">❌ Galat <span class="num">${wrong}</span></div>
                <div class="ftab" onclick="filterQ('skipped',this)">⏭ Skip <span class="num">${skipped}</span></div>
            </div>

            <div id="qContainer">${qCards}</div>
        `;

        openModal(name, html, () => openHistory(name));
    }

    function filterQ(type, btn) {
        document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.q-box').forEach(box => {
            box.style.display = (type === 'all' || box.dataset.type === type) ? 'block' : 'none';
        });
    }
</script>
</body>
  </html>
